<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="kiteGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0369a1;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Kite Body -->
  <path d="M50 5 L15 50 L50 95 L85 50 Z" fill="url(#kiteGrad)" stroke="#ffffff" stroke-width="2"/>
  <!-- Cross Bars -->
  <line x1="50" y1="5" x2="50" y2="95" stroke="#ffffff" stroke-width="1" stroke-dasharray="2"/>
  <line x1="15" y1="50" x2="85" y2="50" stroke="#ffffff" stroke-width="1" stroke-dasharray="2"/>
  <!-- Tail -->
  <path d="M50 95 Q60 105 50 115 Q40 125 50 135" fill="none" stroke="#0ea5e9" stroke-width="3" stroke-linecap="round"/>
  <!-- Rabiola (Tail bows) -->
  <circle cx="55" cy="105" r="3" fill="#0ea5e9"/>
  <circle cx="45" cy="115" r="3" fill="#0ea5e9"/>
  <circle cx="55" cy="125" r="3" fill="#0ea5e9"/>
</svg>
